<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WetzelBulk</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f7f8fa;
            --surface: #fff;
            --border: #eef0f3;
            --text: #1a1a2e;
            --muted: #6b7280;
            --indigo: #4f46e5;
            --green: #16a34a;
        }
        * { box-sizing: border-box; margin:0; padding:0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 12px;
            max-width: 600px;
            margin: 0 auto;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .logo { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
        .logo span { color: var(--indigo); }
        .workout-type {
            font-size: 24px;
            font-weight: 600;
            text-align: center;
            margin: 12px 0 16px;
            color: var(--indigo);
        }
        .exercise {
            background: white;
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 12px;
            padding: 12px;
        }
        .exercise-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .ex-name { font-weight: 600; font-size: 16px; }
        .set-row {
            display: grid;
            grid-template-columns: 55px 110px 110px 50px;
            gap: 6px;
            align-items: center;
            margin: 6px 0;
            padding: 8px;
            background: #f8fafc;
            border-radius: 8px;
            font-size: 15px;
        }
        .col-label { font-size: 12px; color: var(--muted); text-align: center; margin-bottom: 4px; }
        button {
            padding: 6px 10px;
            font-size: 15px;
            border: 1px solid var(--border);
            background: white;
            border-radius: 6px;
            cursor: pointer;
        }
        .btn-plus { background: var(--green); color: white; border: none; }
        .btn-minus { background: #fee2e2; }
        .info-btn {
            background: none;
            border: none;
            font-size: 20px;
            color: var(--indigo);
            cursor: pointer;
            padding: 4px;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">Wetzel<span>Bulk</span></div>
    </header>

    <div id="workout-screen">
        <div class="workout-type" id="workout-title">Push Day</div>
        <div id="exercises-list"></div>
        <button onclick="finishWorkout()" style="margin-top:20px;background:var(--indigo);color:white;border:none;padding:16px;border-radius:12px;width:100%;font-size:18px;">Finish Workout</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
